# WhatsApp Evolution API — Configuracao Base
# Preencher com dados do projeto ao configurar integracao

# Instancia Evolution API
evolution:
  server_url: ""            # URL do servidor (ex: https://evo.meudominio.com)
  api_key: ""               # API key global (NUNCA commitar preenchido)
  instance_name: ""         # Nome da instancia criada para este projeto

# Numero WhatsApp
whatsapp:
  number: ""                # Numero conectado (com DDI, ex: 5511999999999)
  type: "business"          # business | personal
  display_name: ""          # Nome que aparece no WhatsApp

# Webhook (receber mensagens)
webhook:
  url: ""                   # URL do webhook (geralmente n8n)
  events:                   # Eventos que disparam webhook
    - "messages.upsert"
    - "connection.update"
    - "messages.update"

# Mensagens Padrao
defaults:
  greeting: ""              # Mensagem de boas-vindas automatica
  away_message: ""          # Mensagem fora do horario
  business_hours:
    start: "09:00"
    end: "18:00"
    timezone: "America/Sao_Paulo"
    days: ["mon", "tue", "wed", "thu", "fri"]

# Integracao com n8n
n8n_integration:
  webhook_trigger_url: ""   # URL do webhook no n8n que recebe mensagens
  send_message_url: ""      # URL do n8n workflow que envia mensagens
