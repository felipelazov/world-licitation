      Ja criou empresa que faturava R$1.5M, vendeu participacao por R$400k (enganado, entrando na justica).
      Escritorio de alto padrao com solucoes avancadas de IA. Equipe de 5-10 pessoas.
      Viajar o mundo 4x/ano. Ajudar pessoas financeiramente e com recursos.
      Cristao, proposito alinhado com Deus - ser potencializador do Reino.
