workflow:
  id: "publisher-presentation"
  name: "Create Professional Presentation"
  description: "Pipeline para criar apresentacao institucional profissional"
  version: "1.0.0"
  type: "sequential"

metadata:
  author: "Publisher Chief (Orchestrator)"
  created_date: "2026-03-03"
  tags:
    - presentation
    - onboarding
    - institutional
    - pdf

inputs:
  subject:
    type: "string"
    description: "Assunto da apresentacao (ex: 'Onboarding BM PRO', 'Pitch comercial')"
    required: true

  audience:
    type: "string"
    description: "Publico-alvo (ex: 'colaboradores novos', 'investidores', 'clientes')"
    required: true

  tone:
    type: "string"
    description: "Tom: 'professional', 'friendly', 'premium', 'technical'"
    default: "professional"

  content_source:
    type: "string"
    description: "Fonte: 'docs/BM-PRO.md' ou conteudo manual"
    required: false

steps:
  - id: "step_0_briefing"
    name: "Briefing"
    type: "agent"
    agent: "doc-chief"
    description: "Coletar briefing e conteudo fonte"
    outputs:
      briefing: "Publico, objetivo, tom, conteudo bruto"

  - id: "step_1_architecture"
    name: "Information Architecture"
    type: "agent"
    agent: "edward-tufte"
    command: "*structure-presentation"
    description: "Definir fluxo narrativo, hierarquia de informacao, o que entra e o que sai"
    inputs:
      briefing: "{{step_0_briefing.briefing}}"
    outputs:
      narrative_structure: "Fluxo de secoes, hierarquia, conteudo por secao"

  - id: "step_2_design_system"
    name: "Design System"
    type: "agent"
    agent: "massimo-vignelli"
    command: "*design-system"
    description: "Criar sistema visual para a apresentacao"
    inputs:
      narrative: "{{step_1_architecture.narrative_structure}}"
    outputs:
      design_system: "Tipografia, cores, grid, componentes de slide"

  - id: "step_3_typography"
    name: "Typography & Composition"
    type: "agent"
    agent: "ellen-lupton"
    command: "*typography"
    description: "Hierarquia tipografica e composicao visual"
    inputs:
      design_system: "{{step_2_design_system.design_system}}"
    outputs:
      type_specs: "Specs tipograficos completos para cada tipo de slide"

  - id: "step_4_output"
    name: "Final Spec"
    type: "agent"
    agent: "doc-chief"
    description: "Consolidar spec da apresentacao"
    outputs:
      presentation_spec: "Spec completo da apresentacao"

outputs:
  presentation_spec:
    type: "document"
    description: "Especificacao completa da apresentacao"
    source: "step_4_output.presentation_spec"
